{% extends "kitchen/base.html" %}

{% block title %}{{ dish.name }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            {% if dish.image %}
                <img src="{{ dish.image.url }}" class="img-fluid rounded shadow-sm" alt="{{ dish.name }}">
            {% endif %}
        </div>
        <div class="col-md-6">
            <h2>{{ dish.name }}</h2>
            <p class="lead">{{ dish.description }}</p>
            <p>
                <span class="badge bg-success">Price: {{ dish.price }} ₴</span>
                <span class="badge bg-info text-dark">Category: {{ dish.category.name }}</span>
            </p>
            <a href="{% url 'dish_list' %}" class="btn btn-secondary mt-3">Back to Menu</a>
        </div>
    </div>
</div>
{% endblock %}
