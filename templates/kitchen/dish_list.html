{% extends "kitchen/base.html" %}

{% block title %}Dishes{% endblock %}

{% block content %}
<h2 class="mb-4">Dishes</h2>

<!-- Форма пошуку -->
<form method="get" class="mb-4">
    <div class="input-group">
        <input type="text" name="q" value="{{ query }}" class="form-control" placeholder="Search dishes...">
        <button class="btn btn-primary" type="submit">Search</button>
    </div>
</form>

<div class="row">
    {% for dish in dishes %}
        <div class="col-md-4 mb-3">
            <div class="card shadow-sm">
                <img src="{{ dish.image.url }}" class="card-img-top" alt="{{ dish.name }}">
                <div class="card-body">
                    <h5 class="card-title">{{ dish.name }}</h5>
                    <p class="card-text">{{ dish.description }}</p>
                </div>
            </div>
        </div>
    {% empty %}
        <p>No dishes found.</p>
    {% endfor %}
</div>
{% endblock %}
