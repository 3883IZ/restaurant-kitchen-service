<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dishes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Restaurant Menu</h1>

        <!-- Навігація по категоріях -->
        <nav class="mb-4 text-center">
            {% for category in categories %}
                <a href="#{{ category.name|slugify }}" class="btn btn-outline-primary me-2">
                    {{ category.name }}
                </a>
            {% endfor %}
        </nav>

        <!-- Відображення категорій та страв -->
        {% for category in categories %}
            <h2 id="{{ category.name|slugify }}" class="mt-4 mb-3 text-primary border-bottom pb-2">
                {{ category.name }}
            </h2>
            <div class="row row-cols-1 row-cols-md-3 g-4">
                {% for dish in category.dishes.all %}
                    <div class="col">
                        <div class="card shadow-sm h-100">
                            {% if dish.image %}
                                <img src="{{ dish.image.url }}" class="card-img-top" alt="{{ dish.name }}">
                            {% endif %}
                            <div class="card-body">
                                <h5 class="card-title">{{ dish.name }}</h5>
                                <h6 class="card-subtitle mb-2 text-muted">
                                    ${{ dish.price }}
                                </h6>
                                <p class="card-text">{{ dish.description }}</p>
                                <a href="#" class="btn btn-sm btn-success">Order</a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% endfor %}
    </div>
</body>
</html>
