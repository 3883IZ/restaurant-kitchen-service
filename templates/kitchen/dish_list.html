{% extends "kitchen/base.html" %}

{% block title %}Dishes{% endblock %}

{% block content %}
<h2 class="mb-4">Dishes</h2>
<div class="row">
    {% for dish in dishes %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                {% if dish.image %}
                    <img src="{{ dish.image.url }}" class="card-img-top" alt="{{ dish.name }}">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ dish.name }}</h5>
                    <p class="card-text">
                        <strong>Price:</strong> {{ dish.price }}<br>
                        <strong>Category:</strong> {{ dish.category.name }}
                    </p>
                </div>
            </div>
        </div>
    {% empty %}
        <p>No dishes available.</p>
    {% endfor %}
</div>
{% endblock %}
